server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /config.js {
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    location /assets/ {
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        # Ensure deployments take effect immediately: HTML should revalidate, assets stay immutable.
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
