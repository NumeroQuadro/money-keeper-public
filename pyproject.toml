[tool.ruff]
target-version = "py310"
line-length = 100
exclude = [
  ".git",
  ".venv",
  ".venv310",
  "__pycache__",
  "gpt5.2pro.md",
]

[tool.ruff.lint]
select = ["E", "F"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

[tool.mypy]
python_version = "3.10"
files = ["api/app/domain", "api/app/tests/fixture_data.py", "api/app/tests/test_domain_unit.py"]
mypy_path = ["api"]
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_configs = true
show_error_codes = true
pretty = true
exclude = ["^\\.venv/", "^\\.venv310/"]
disable_error_code = ["import-untyped"]
