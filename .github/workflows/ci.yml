name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: money_keeper_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d money_keeper_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/money_keeper_ci
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/money_keeper_ci
      TEST_DATABASE_SCHEMA: money_keeper_tests
      TESTING: "1"
      TEST_ALLOW_LOCAL_DB: "1"
      TEST_ALLOW_SHARED_DB: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install -r bot/requirements.txt
          pip install pyyaml pytest mypy ruff

      - name: Ruff Lint
        run: ruff check api/app bot/tests

      - name: Ruff Format Check
        run: ruff format --check api/app bot/tests

      - name: Mypy
        run: mypy --config-file pyproject.toml

      - name: Pytest
        run: PYTHONPATH=.:api pytest -q api/app/tests bot/tests

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: web-react

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-react/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
